name: Nightly Build Index

on:
  schedule:
    - cron: '0 3 * * *' # Runs at 3:00 AM UTC every day
  workflow_dispatch:

jobs:
  build-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set up Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: 2.7.11

      - name: Run build-index script
        run: deno run --allow-read --allow-write scripts/build-index.ts

      - name: Check for changes in index.html
        id: git-diff
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected."
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request if needed
        if: steps.git-diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: nightly index.html update"
          title: "Nightly index.html update"
          body: "Automated update of index.html from nightly build."
          branch: nightly/index-update
          base: ${{ github.ref_name }}
