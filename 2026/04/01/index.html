<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="location" content="Honolulu, HI">
    <meta name="keywords" content="poem">
    <title>alienable</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100dvh;
        background-color: whitesmoke;
      }

      #text {
        font-family: monospace;
        font-size: 16px;
        line-height: 32px;
        text-align: left;
        padding: 16px;

      }

      p {
        margin: 0;
        padding: 0;
      }
    </style>
  </head>

  <body>
    <div id="text">
      <p>the old elks and</p>
      <p>snooty outriggers</p>
      <p>share the same</p>
      <p>property,</p>
      <p>illiberty and</p>
      <p>fruit</p>
      <p>of delusion</p>
    </div>
  </body>

</html>
