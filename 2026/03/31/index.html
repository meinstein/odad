<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="location" content="Honolulu, HI">
    <meta name="keywords" content="poem">
    <title>strange physics</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100dvh;
        background-color: whitesmoke;
      }

      #text {
        font-family: monospace;
        font-size: 16px;
        line-height: 32px;
        text-align: left;
        padding: 16px;

      }

      p {
        margin: 0;
        padding: 0;
      }
    </style>
  </head>

  <body>
    <div id="text">
      <p>to eat a brie</p>
      <p>sandwich beneath</p>
      <p>an old banyan</p>
      <p>defies gravity</p>
      <p>as much as</p>
      <p>one's senses</p>
    </div>
  </body>

</html>
